cluster:
  enabled: true
  liaison:
    replicas: 1
  data:
    nodeTemplate:
      replicas: 3
standalone:
  enabled: false
etcd:
  enabled: true
image:
  repository: apache/skywalking-banyandb
  tag: latest
  pullPolicy: Never
storage:
  data:
    enabled: true
    persistentVolumeClaims:
      - mountTargets: ["measure", "stream", "trace", "property"]
        nodeRole: hot
        claimName: hot-benchmark-data
        size: 2Gi
        accessModes:
          - ReadWriteOnce
        storageClass: null
        volumeMode: Filesystem
  liaison:
    enabled: true
    persistentVolumeClaims:
      - mountTargets: ["measure", "stream", "trace", "property"]
        claimName: liaison-data
        size: 1Gi
        accessModes:
          - ReadWriteOnce
        storageClass: null
        volumeMode: Filesystem
  standalone:
    enabled: false
